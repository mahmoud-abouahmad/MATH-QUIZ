<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>اختبار النهايات والاستمرار | أ. محمود الدياب</title>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#08172f;--navy2:#102b57;--gold:#d5a53a;--paper:#fffaf0;--cream:#f4ead7;
  --ink:#102033;--muted:#64748b;--good:#12824a;--bad:#b3261e;--line:#dacb9c;--blue:#2f73ff;
}
*{box-sizing:border-box} body{margin:0;font-family:'Cairo',Arial,sans-serif;background:radial-gradient(circle at top right,#173d76 0,#08172f 42%,#050b16 100%);min-height:100vh;color:var(--ink);}
body:before{content:"∫  lim  f(x)  →∞  ε  δ  √x  sin x";position:fixed;inset:auto -4vw 6vh auto;font-size:5.8rem;color:rgba(255,255,255,.035);font-weight:800;transform:rotate(-12deg);pointer-events:none;white-space:nowrap}
.wrap{width:min(1120px,94vw);margin:0 auto;padding:22px 0 34px}.top{display:flex;align-items:center;justify-content:space-between;gap:14px;color:#fff;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px}.logo{width:58px;height:58px;border-radius:18px;background:linear-gradient(145deg,var(--gold),#fff2b8);display:grid;place-items:center;color:var(--navy);font-size:1.55rem;font-weight:800;box-shadow:0 12px 30px rgba(0,0,0,.28)}h1{font-size:1.45rem;margin:0;line-height:1.3}.sub{color:#d9e8ff;font-size:.9rem;margin-top:3px}.contact{text-align:left;color:#f3dfab;font-weight:700}.hero{background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.28);margin-bottom:14px}.hero-inner{background:var(--paper);border-radius:17px;padding:18px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;border:1px solid var(--line)}.hero h2{margin:0 0 6px;font-size:1.28rem;color:var(--navy)}.hero p{margin:0;color:var(--muted);font-weight:600}.progressBox{text-align:center;min-width:210px;background:linear-gradient(160deg,var(--navy),var(--navy2));color:#fff;border-radius:16px;padding:12px}.score{font-size:2rem;font-weight:800;color:var(--gold)}.bar{height:9px;background:#d9d1bd;border-radius:20px;overflow:hidden;margin-top:10px}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#ffe5a6);transition:.35s}.layout{display:grid;grid-template-columns:260px 1fr;gap:16px}.side{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:12px;align-self:start;position:sticky;top:14px}.side h3{color:#fff;margin:.2rem .2rem .7rem;font-size:1rem}.qnav{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.qnav button{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:8px 0;cursor:pointer;font-weight:800}.qnav button.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}.qnav button.done{background:rgba(18,130,74,.9);border-color:#65c98d}.card{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:18px 18px 14px;box-shadow:0 12px 34px rgba(0,0,0,.22);min-height:470px}.meta{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.tag{background:var(--cream);border:1px solid var(--line);border-radius:999px;padding:4px 12px;color:var(--navy);font-weight:800}.type{color:var(--muted);font-weight:700}.question{font-size:1.35rem;line-height:2.1;margin:18px 0;color:#111827;font-weight:700}.choices{display:grid;grid-template-columns:1fr;gap:10px;margin-top:16px}.choice{display:flex;gap:10px;align-items:center;justify-content:space-between;border:2px solid #e6dac0;background:#fffdf8;border-radius:15px;padding:12px 13px;cursor:pointer;transition:.18s;font-size:1.12rem;min-height:58px}.choice:hover{transform:translateY(-1px);border-color:var(--gold);box-shadow:0 8px 18px rgba(0,0,0,.08)}.letter{order:2;min-width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--navy);color:#fff;font-weight:800}.choice span.txt{flex:1;text-align:right}.choice.selected{border-color:var(--blue);background:#eef4ff}.choice.correct{border-color:var(--good);background:#effaf3}.choice.wrong{border-color:var(--bad);background:#fff0ef}.feedback{margin-top:13px;padding:11px 12px;border-radius:14px;font-weight:800;display:none}.feedback.good{display:block;background:#e9f8ef;color:var(--good);border:1px solid #9fe0b7}.feedback.bad{display:block;background:#fff0ef;color:var(--bad);border:1px solid #f0aaa5}.actions{display:flex;justify-content:space-between;gap:10px;margin-top:16px;flex-wrap:wrap}.btn{border:0;border-radius:12px;padding:10px 18px;cursor:pointer;font-family:inherit;font-weight:800;background:var(--blue);color:#fff}.btn.secondary{background:var(--navy)}.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--navy)}.result{display:none;background:var(--paper);border-radius:22px;padding:22px;border:1px solid var(--line);box-shadow:0 12px 34px rgba(0,0,0,.22);text-align:center}.result.show{display:block}.result h2{font-size:2rem;margin:.2rem 0;color:var(--navy)}.result .big{font-size:3.5rem;color:var(--gold);font-weight:900}.graph{direction:ltr;margin:10px auto;background:#fff;border:1px solid #ddd;border-radius:12px;max-width:480px;display:block}@media(max-width:860px){.layout{grid-template-columns:1fr}.side{position:static}.hero-inner{grid-template-columns:1fr}.top{flex-direction:column;align-items:flex-start}.contact{text-align:right}.question{font-size:1.14rem}.choice{font-size:1rem}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand"><div class="logo">م</div><div><h1>اختبار النهايات والاستمرار</h1><div class="sub">نسخة تفاعلية — الأستاذ محمود الدياب</div></div></div>
    <div class="contact">📞 0956268336</div>
  </header>
  <section class="hero"><div class="hero-inner"><div><h2>اختاري الإجابة الصحيحة</h2><p>اضغطي على أحد الخيارات، ثم انتقلي للسؤال التالي. في النهاية تظهر النتيجة مباشرة.</p></div><div class="progressBox"><div>التقدم</div><div class="score"><span id="answered">0</span>/<span id="total">21</span></div><div class="bar"><div class="fill" id="fill"></div></div></div></div></section>
  <main class="layout"><aside class="side"><h3>خريطة الأسئلة</h3><div class="qnav" id="qnav"></div></aside><section><div class="card" id="card"><div class="meta"><span class="tag" id="qnum"></span><span class="type" id="qtype"></span></div><div class="question" id="qtext"></div><div id="graphHolder"></div><div class="choices" id="choices"></div><div id="feedback" class="feedback"></div><div class="actions"><button class="btn ghost" id="prev">السابق</button><button class="btn secondary" id="resetQ">إلغاء الاختيار</button><button class="btn" id="next">التالي</button></div></div><div class="result" id="result"><h2>النتيجة النهائية</h2><div class="big" id="finalScore"></div><p id="finalMsg"></p><button class="btn secondary" onclick="restart()">إعادة الاختبار</button></div></section></main>
</div>
<script>
const questions = [
{type:'مقارب مائل',q:'ليكن \\(f(x)=\\dfrac{x^2-5x+1}{x+1}\\). معادلة المقارب المائل عند \\(+\\infty\\) هي:',choices:{A:'\\(y=x-6\\)',B:'\\(y=x+4\\)',C:'\\(y=x-4\\)',D:'\\(y=-x+6\\)',E:'\\(y=x+6\\)'},ans:'A'},
{type:'نهاية مثلثية',q:'إن \\(\\lim_{x\\to +\\infty}\\sin\\left(\\dfrac{\\pi x-x+E(x)}{2x+1}\\right)\\) تساوي:',choices:{A:'\\(2\\)',B:'\\(\\dfrac{\\pi}{2}\\)',C:'\\(0\\)',D:'\\(-1\\)',E:'\\(1\\)'},ans:'E'},
{type:'تابع عكسي',q:'ليكن \\(f(x)=\\dfrac{5x+3}{x-2}\\). التابع العكسي هو:',choices:{A:'\\(\\dfrac{5x-3}{x+2}\\)',B:'\\(\\dfrac{3x-5}{2x+1}\\)',C:'\\(\\dfrac{x-5}{x+1}\\)',D:'\\(\\dfrac{2x+3}{x-5}\\)',E:'\\(\\dfrac{-2x+3}{x+5}\\)'},ans:'D'},
{type:'نهاية مثلثية',q:'إن \\(\\lim_{x\\to0}\\dfrac{4\\sin 2x}{3x}\\) تساوي:',choices:{A:'\\(2\\)',B:'\\(\\dfrac{8}{3}\\)',C:'\\(\\dfrac{1}{2}\\)',D:'\\(\\dfrac{4}{3}\\)',E:'\\(1\\)'},ans:'B'},
{type:'تابع محدود',q:'ليكن \\(f(x)=\\dfrac{3+2\\cos x}{2+\\cos x}\\). فإن التابع محدود بين:',choices:{A:'\\([0,2]\\)',B:'\\([1,\\dfrac{5}{3}]\\)',C:'\\([\\dfrac{1}{3},1]\\)',D:'\\([2,3]\\)',E:'\\([-1,1]\\)'},ans:'B'},
{type:'قسمة حدودية',q:'ليكن \\(f(x)=\\dfrac{-x^3+x^2+1}{x^2+1}\\). فإن التابع يكتب بالشكل:',choices:{A:'\\(x-2+\\dfrac{x}{x^2+1}\\)',B:'\\(x+2+\\dfrac{x}{x^2+1}\\)',C:'\\(-x+1+\\dfrac{x}{x^2+1}\\)',D:'\\(x-1+\\dfrac{x}{x^2+1}\\)',E:'\\(x+1+\\dfrac{x}{x^2+1}\\)'},ans:'C'},
{type:'نهاية مثلثية',q:'إن \\(\\lim_{x\\to0}\\dfrac{x+x\\cos x}{\\sin x}\\) تساوي:',choices:{A:'\\(-2\\)',B:'\\(0\\)',C:'\\(2\\)',D:'\\(-1\\)',E:'\\(1\\)'},ans:'C'},
{type:'نهاية عند اللانهاية',q:'إن \\(\\lim_{x\\to\\infty}\\dfrac{4x+\\sqrt{x}}{x-1}\\) تساوي:',choices:{A:'\\(0\\)',B:'\\(+\\infty\\)',C:'\\(2\\)',D:'\\(4\\)',E:'\\(1\\)'},ans:'D'},
{type:'مقارب مائل',q:'ليكن \\(f(x)=x+\\dfrac{x}{\\sqrt{x^2+1}}\\). معادلة المقارب المائل عند \\(+\\infty\\) هي:',choices:{A:'\\(y=-x+1\\)',B:'\\(y=-x\\)',C:'\\(y=x\\)',D:'\\(y=x-1\\)',E:'\\(y=x+1\\)'},ans:'E'},
{type:'مقارب مائل',q:'ليكن \\(f(x)=\\sqrt{x^2+4x+5}\\). معادلة المقارب المائل عند \\(+\\infty\\) هي:',choices:{A:'\\(y=x+2\\)',B:'\\(y=x\\)',C:'\\(y=x-2\\)',D:'\\(y=2x\\)',E:'\\(y=x+1\\)'},ans:'A'},
{type:'نهاية جبرية',q:'إن \\(\\lim_{x\\to2}\\dfrac{x^3-8}{x^2-3x+2}\\) تساوي:',choices:{A:'\\(3\\)',B:'\\(2\\)',C:'\\(12\\)',D:'\\(-3\\)',E:'\\(6\\)'},ans:'C'},
{type:'نهاية جذرية',q:'إن \\(\\lim_{x\\to0}\\dfrac{\\sqrt{x+1}-\\cos x}{x}\\) تساوي:',choices:{A:'\\(-\\dfrac12\\)',B:'\\(0\\)',C:'\\(2\\)',D:'\\(1\\)',E:'\\(\\dfrac12\\)'},ans:'E'},
{type:'نهاية جذرية',q:'إن \\(\\lim_{x\\to1}\\dfrac{\\sqrt{x+1}-\\sqrt2}{x-1}\\) تساوي:',choices:{A:'\\(2\\)',B:'\\(2\\sqrt2\\)',C:'\\(\\dfrac{1}{2\\sqrt2}\\)',D:'\\(\\sqrt2\\)',E:'\\(\\dfrac{1}{\\sqrt2}\\)'},ans:'C'},
{type:'نهاية عند ناقص اللانهاية',q:'إن \\(\\lim_{x\\to-\\infty}\\dfrac{\\sqrt{4x^2+1}}{x+2}\\) تساوي:',choices:{A:'\\(4\\)',B:'\\(-\\infty\\)',C:'\\(+\\infty\\)',D:'\\(-2\\)',E:'\\(2\\)'},ans:'D'},
{type:'مقارب مائل',q:'ليكن \\(f(x)=x\\sin\\left(\\dfrac1x\\right)-x\\). معادلة المقارب المائل عند \\(+\\infty\\) هي:',choices:{A:'\\(y=-x+1\\)',B:'\\(y=-x\\)',C:'\\(y=x\\)',D:'\\(y=x-1\\)',E:'\\(y=-x-1\\)'},ans:'A'},
{type:'نهاية مثلثية',q:'إن \\(\\lim_{x\\to0}\\dfrac{x+\\sin x}{2x-3\\sin2x}\\) تساوي:',choices:{A:'\\(-2\\)',B:'\\(1\\)',C:'\\(2\\)',D:'\\(-\\dfrac12\\)',E:'\\(\\dfrac12\\)'},ans:'D'},
{type:'استمرار',q:'ليكن \\(f(x)=\\begin{cases}1-x^2\\sin\\dfrac1x & x\\ne0\\\\ m & x=0\\end{cases}\\). قيمة \\(m\\) التي تجعل التابع مستمراً هي:',choices:{A:'\\(-2\\)',B:'\\(-1\\)',C:'\\(2\\)',D:'\\(0\\)',E:'\\(1\\)'},ans:'E'},
{type:'استمرار',q:'ليكن \\(f(x)=\\begin{cases}\\dfrac{x^2}{\\sqrt{4+x^2}-2} & x\\ne0\\\\ m & x=0\\end{cases}\\). قيمة \\(m\\) التي تجعل التابع مستمراً هي:',choices:{A:'\\(-2\\)',B:'\\(-1\\)',C:'\\(4\\)',D:'\\(1\\)',E:'\\(3\\)'},ans:'C'},
{type:'استمرار',q:'ليكن \\(f(x)=\\begin{cases}\\dfrac{x\\sin x}{\\sqrt{4+x^2}-2} & x\\ne0\\\\ m+1 & x=0\\end{cases}\\). قيمة \\(m\\) التي تجعل التابع مستمراً هي:',choices:{A:'\\(4\\)',B:'\\(0\\)',C:'\\(2\\)',D:'\\(3\\)',E:'\\(1\\)'},ans:'D'},
{type:'جزء صحيح',q:'ليكن \\(f(x)=x-E(x)\\) على \\([0,2]\\). فإن \\(\\lim_{x\\to1^+}f(x)\\) هي:',choices:{A:'\\(4\\)',B:'\\(0\\)',C:'\\(2\\)',D:'\\(3\\)',E:'\\(1\\)'},ans:'B'},
{type:'قراءة بيانية',q:'اعتماداً على الشكل البياني، عدد حلول المعادلة \\(f(x)=0\\) هو:',graph:true,choices:{A:'\\(4\\)',B:'\\(2\\)',C:'\\(1\\)',D:'\\(0\\)',E:'\\(3\\)'},ans:'C'}
];
let current=0; const selected=Array(questions.length).fill(null);
const qnav=document.getElementById('qnav'), qnum=document.getElementById('qnum'), qtype=document.getElementById('qtype'), qtext=document.getElementById('qtext'), choicesDiv=document.getElementById('choices'), feedback=document.getElementById('feedback'), graphHolder=document.getElementById('graphHolder');
document.getElementById('total').textContent=questions.length;
questions.forEach((_,i)=>{const b=document.createElement('button');b.textContent=i+1;b.onclick=()=>{current=i;render()};qnav.appendChild(b)});
function graphSvg(){return `<svg class="graph" viewBox="0 0 520 260"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#ddd" stroke-width="1"/></pattern></defs><rect width="520" height="260" fill="url(#grid)"/><path d="M0 170H520M80 0V260" stroke="#111" stroke-width="2"/><path d="M0 180 L520 20" stroke="#111" stroke-width="3" fill="none" opacity=".85"/><path d="M250 0V260" stroke="#b3261e" stroke-width="2" stroke-dasharray="8 6"/><path d="M15 180 C80 140 135 118 160 125 C185 132 205 165 220 245" stroke="#173d76" stroke-width="4" fill="none"/><path d="M270 15 C285 85 310 102 355 100 C415 98 465 60 510 32" stroke="#173d76" stroke-width="4" fill="none"/><text x="505" y="155" font-size="18">x</text><text x="90" y="20" font-size="18">y</text></svg>`}
function render(){
  const q=questions[current]; qnum.textContent='السؤال '+(current+1); qtype.textContent=q.type; qtext.innerHTML=q.q; graphHolder.innerHTML=q.graph?graphSvg():''; choicesDiv.innerHTML=''; feedback.className='feedback'; feedback.style.display='none'; feedback.textContent='';
  Object.entries(q.choices).forEach(([letter,txt])=>{const div=document.createElement('div');div.className='choice'; if(selected[current]===letter) div.classList.add('selected'); div.innerHTML=`<span class="txt">${txt}</span><span class="letter">${letter}</span>`; div.onclick=()=>select(letter); choicesDiv.appendChild(div)});
  document.querySelectorAll('.qnav button').forEach((b,i)=>{b.classList.toggle('active',i===current); b.classList.toggle('done',selected[i]!==null)});
  updateProgress(); if(window.MathJax) MathJax.typesetPromise();
}
function select(letter){selected[current]=letter; [...choicesDiv.children].forEach((el,i)=>{const l=Object.keys(questions[current].choices)[i]; el.classList.remove('selected','correct','wrong'); if(l===letter) el.classList.add('selected')}); showFeedback(); updateProgress(); renderNavOnly();}
function showFeedback(){const q=questions[current]; const ok=selected[current]===q.ans; [...choicesDiv.children].forEach((el,i)=>{const l=Object.keys(q.choices)[i]; if(l===q.ans) el.classList.add('correct'); if(l===selected[current] && !ok) el.classList.add('wrong')}); feedback.style.display='block'; feedback.className='feedback '+(ok?'good':'bad'); feedback.textContent=ok?'إجابة صحيحة ✅':'إجابة غير صحيحة ❌';}
function renderNavOnly(){document.querySelectorAll('.qnav button').forEach((b,i)=>b.classList.toggle('done',selected[i]!==null));}
function updateProgress(){const n=selected.filter(Boolean).length; document.getElementById('answered').textContent=n; document.getElementById('fill').style.width=(n/questions.length*100)+'%'}
document.getElementById('next').onclick=()=>{if(current<questions.length-1){current++;render()}else showResult()};
document.getElementById('prev').onclick=()=>{if(current>0){current--;render()}};
document.getElementById('resetQ').onclick=()=>{selected[current]=null;render()};
function showResult(){const correct=questions.reduce((s,q,i)=>s+(selected[i]===q.ans?1:0),0);document.getElementById('card').style.display='none';document.getElementById('result').classList.add('show');document.getElementById('finalScore').textContent=correct+' / '+questions.length;const p=Math.round(correct/questions.length*100);document.getElementById('finalMsg').textContent=p>=85?'ممتاز جداً — جاهزية قوية.':p>=60?'جيد — راجعي الأسئلة غير الصحيحة.':'تحتاجين مراجعة مركزة للنهايات والاستمرار.'}
function restart(){for(let i=0;i<selected.length;i++)selected[i]=null;current=0;document.getElementById('card').style.display='block';document.getElementById('result').classList.remove('show');render()}
render();
</script>
</body>
</html>
